<style>
  :root {
    --bg-deep:      #040B16;                      /* azul bem escuro */
    --bg-glow:      #0a1c33;
    --accent:       #60A9DF;                      /* azul dos botões */
    --accent-2:     #7CBBEA;                      /* hover, mais claro */
    --accent-soft:  rgba(96, 169, 223, 0.13);
    --slate:        #6E97B4;
    --ink:          #EAF2F8;
    --line:         rgba(96, 169, 223, 0.20);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(120% 70% at 50% -10%, var(--bg-glow) 0%, var(--bg-deep) 60%) fixed;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100%;
    display: flex;
    justify-content: center;
    padding: 56px 24px 40px;
  }

  .stage {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* ---------- Logo ---------- */
  .logo {
    display: block;
    width: 215px;
    max-width: 74%;
    height: auto;
  }

  /* ---------- Signature: linha da rotina que não para ---------- */
  .flowline {
    position: relative;
    width: 44px;
    height: 2px;
    margin: 22px 0 26px;
    background: var(--line);
    border-radius: 2px;
    overflow: hidden;
  }
  .flowline::after {
    content: "";
    position: absolute;
    inset: 0;
    width: 40%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    transform: translateX(-120%);
    animation: flow 3.4s cubic-bezier(.4,0,.2,1) infinite;
  }
  @keyframes flow {
    0%   { transform: translateX(-120%); }
    60%  { transform: translateX(280%); }
    100% { transform: translateX(280%); }
  }

  /* ---------- Tagline + posicionamento ---------- */
  .tagline {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.35;
    letter-spacing: -0.01em;
    max-width: 15ch;
  }
  .lede {
    margin-top: 12px;
    font-size: 13.5px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--slate);
    max-width: 30ch;
  }

  /* ---------- Botões ---------- */
  .links {
    width: 100%;
    margin-top: 34px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 18px;
    border-radius: 14px;
    text-decoration: none;
    text-align: left;
    transition: transform .18s ease, background-color .18s ease, border-color .18s ease;
  }
  .btn:active { transform: scale(0.985); }

  .btn .ico {
    flex: 0 0 22px;
    width: 22px;
    height: 22px;
    display: grid;
    place-items: center;
  }
  .btn .txt { display: flex; flex-direction: column; gap: 2px; line-height: 1.2; }
  .btn .title { font-size: 15px; font-weight: 600; }
  .btn .sub   { font-size: 12px; font-weight: 400; }
  .btn .arrow { margin-left: auto; opacity: .55; transition: transform .18s ease, opacity .18s ease; }
  .btn:hover .arrow { transform: translateX(3px); opacity: .9; }

  /* Primário — WhatsApp */
  .btn--wa {
    background: var(--accent);
    color: #051523;
  }
  .btn--wa .sub { color: rgba(5,21,35,0.70); }
  .btn--wa:hover { background: var(--accent-2); }

  /* Secundário — Site */
  .btn--site {
    background: var(--accent-soft);
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn--site .ico { color: var(--accent); }
  .btn--site .sub { color: var(--slate); }
  .btn--site:hover { background: rgba(96,169,223,0.18); border-color: rgba(96,169,223,0.50); }

  .btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  /* ---------- Rodapé ---------- */
  .foot {
    margin-top: 34px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .presence {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--slate);
    font-weight: 500;
  }
  .handle {
    font-size: 12px;
    color: rgba(233,241,244,0.42);
    text-decoration: none;
    letter-spacing: 0.02em;
  }
  .handle:hover { color: var(--slate); }

  /* ---------- Entrada suave ---------- */
  .stage > * {
    opacity: 0;
    transform: translateY(10px);
    animation: rise .6s cubic-bezier(.2,.65,.3,1) forwards;
  }
  .stage > *:nth-child(1) { animation-delay: .02s; }
  .stage > *:nth-child(2) { animation-delay: .10s; }
  .stage > *:nth-child(3) { animation-delay: .18s; }
  .stage > *:nth-child(4) { animation-delay: .26s; }
  .stage > *:nth-child(5) { animation-delay: .34s; }
  .stage > *:nth-child(6) { animation-delay: .42s; }
  @keyframes rise { to { opacity: 1; transform: none; } }

  @media (prefers-reduced-motion: reduce) {
    .stage > *, .flowline::after { animation: none !important; opacity: 1 !important; transform: none !important; }
  }
</style>
</head>
